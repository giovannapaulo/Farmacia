server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: servico-produtos
          uri: http://localhost:8081
          predicates:
            - Path=/produtos/**
        
        - id: servico-vendas
          uri: http://localhost:8082
          predicates:
            - Path=/vendas/**

        - id: servico-clientes
          uri: http://localhost:8083
          predicates:
            - Path=/clientes/**

        - id: servico-notafiscal
          uri: http://localhost:8084
          predicates:
            - Path=/notafiscal/**

        - id: servico-receitas
          uri: http://localhost:8085
          predicates:
            - Path=/receitas/**

        - id: servico-relatorios
          uri: http://localhost:8086
          predicates:
            - Path=/relatorios/**